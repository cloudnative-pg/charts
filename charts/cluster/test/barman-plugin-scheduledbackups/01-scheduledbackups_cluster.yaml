type: postgresql
mode: standalone
cluster:
  instances: 1
  # Use a short stopDelay so teardown is fast: the chart forces `immediate: true`
  # on scheduled backups, so a backup can still be running at cleanup time, and
  # Barman blocks instance shutdown until it completes. A low stopDelay caps the
  # pod's terminationGracePeriodSeconds, force-stopping the instance promptly.
  # This test only needs to observe that a backup was started.
  stopDelay: 30
  storage:
    size: 256Mi

backups:
  enabled: true
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  provider: s3
  endpointURL: "https://minio.minio.svc.cluster.local"
  endpointCA:
    name: kube-root-ca.crt
    key: ca.crt
  wal:
    encryption: ""
  data:
    encryption: ""
  s3:
    bucket: "mybucket"
    path: "/barman-plugin-scheduledbackups/v1"
    accessKey: "minio"
    secretKey: "minio123"
    region: "local"
  retentionPolicy: "30d"
  scheduledBackups:
    - name: daily-backup
      schedule: "0 0 0 * * *"
      backupOwnerReference: self
      method: plugin
      pluginConfiguration:
        name: barman-cloud.cloudnative-pg.io
    - name: weekly-backup
      schedule: "0 0 0 * * 1"
      backupOwnerReference: self
      method: plugin
      pluginConfiguration:
        name: barman-cloud.cloudnative-pg.io
