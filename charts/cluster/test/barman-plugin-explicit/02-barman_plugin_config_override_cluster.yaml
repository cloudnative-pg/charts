type: postgresql
mode: standalone
cluster:
  instances: 1
  storage:
    size: 256Mi
  plugins:
  - name: foo.example.com
    enabled: true
    isWALArchiver: false
    parameters:
      foo: bar
  - name: barman-cloud.cloudnative-pg.io
    enabled: false
    isWALArchiver: false
    parameters:
      foo: bar
      barmanObjectName: asd

backups:
  enabled: true
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  provider: s3
  endpointURL: "https://minio.minio.svc.cluster.local"
  endpointCA:
    name: kube-root-ca.crt
    key: ca.crt
  wal:
    encryption: ""
  data:
    encryption: ""
  s3:
    bucket: "mybucket"
    path: "/barman-plugin-scheduledbackups/v1"
    accessKey: "minio"
    secretKey: "minio123"
    region: "local"
  retentionPolicy: "30d"
