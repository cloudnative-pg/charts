type: postgresql
mode: standalone
cluster:
  instances: 1
  storage:
    size: 256Mi

backups:
  enabled: true
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  # The feature under test: no Helm hook on the ObjectStore, plus an ArgoCD-style ordering annotation.
  objectStore:
    helmHook: false
    annotations:
      argocd.argoproj.io/sync-wave: "-1"
  provider: s3
  endpointURL: "https://minio.minio.svc.cluster.local"
  endpointCA:
    name: kube-root-ca.crt
    key: ca.crt
  wal:
    encryption: ""
  data:
    encryption: ""
  s3:
    bucket: "mybucket"
    path: "/barman-plugin-objectstore-hook/v1"
    accessKey: "minio"
    secretKey: "minio123"
    region: "local"
  retentionPolicy: "30d"
