{{- if and (eq .Values.mode "recovery") (eq .Values.recovery.method "plugin") (eq .Values.recovery.pluginConfiguration.name "barman-cloud.cloudnative-pg.io") }}
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: {{ include "cluster.fullname" . }}-recovery
  namespace: {{ include "cluster.namespace" . }}
  {{- if or .Values.backups.objectStore.helmHook .Values.cluster.annotations .Values.backups.objectStore.annotations }}
  annotations:
    {{- if .Values.backups.objectStore.helmHook }}
    "helm.sh/hook": pre-install,pre-upgrade,pre-rollback
    {{- end }}
    {{- with .Values.cluster.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.backups.objectStore.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
  labels:
    cnpg.io/cluster: {{ include "cluster.fullname" . }}
    {{- include "cluster.labels" . | nindent 4 }}
spec:
  configuration:
    {{- $d := dict "chartFullname" (include "cluster.fullname" .) "scope" .Values.recovery "secretPrefix" "recovery" -}}
    {{- include "cluster.barmanObjectStoreConfig" $d | indent 2 }}
  instanceSidecarConfiguration:
    {{- .Values.recovery.instanceSidecarConfiguration | toYaml | nindent 4 }}
{{- end }}
